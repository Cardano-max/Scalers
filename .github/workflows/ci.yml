name: ci

# Gate every change to main: lint + test must pass before a PR can merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python engine: lint (ruff) + DB-free unit tests with coverage. The engine is
  # a uv project (uv.lock pinned), so tooling runs through `uv run`.
  # ---------------------------------------------------------------------------
  engine:
    name: engine · lint + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: engine/uv.lock

      - name: Sync deps (incl. dev tools)
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check (advisory)
        # Format adoption is a follow-up; drift is a warning, not a failure.
        run: |
          uv run ruff format --check . \
            || echo "::warning::ruff format drift — adoption pending (advisory, non-blocking)"

      - name: Unit tests (DB-free) + coverage
        run: uv run pytest -m "not integration" --cov --cov-report=term-missing --cov-fail-under=50

  # ---------------------------------------------------------------------------
  # Integration tests against a REAL Postgres + pgvector. This is what stops
  # real-PG / async-checkpointer defects from hiding under InMemorySaver: the
  # job stands up a pgvector service, sets ENGINE_DATABASE_URL, and runs every
  # test marked `integration` (the engine checkpointer + run-store tests).
  # ---------------------------------------------------------------------------
  engine-integration:
    name: engine · integration (real Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: scalers
          POSTGRES_PASSWORD: scalers
          POSTGRES_DB: scalers
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scalers"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENGINE_DATABASE_URL: postgresql://scalers:scalers@localhost:5432/scalers
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: engine/uv.lock

      - name: Sync deps (incl. postgres extra)
        run: uv sync --dev --extra postgres

      - name: Integration tests (real Postgres + pgvector)
        run: uv run pytest -m integration -v

  # ---------------------------------------------------------------------------
  # Frontend (gateway + web): eslint/prettier placeholders. Not scaffolded in
  # Phase 1, so the job sets up Node + caching and skips gracefully until a
  # package.json exists. It must stay green in the meantime.
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (node)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [gateway, web]
    steps:
      - uses: actions/checkout@v4

      # Detect whether this app is scaffolded yet. setup-node's npm cache errors
      # when no lockfile exists, so we gate the Node steps on package.json.
      - name: Detect ${{ matrix.app }}
        id: detect
        run: |
          if [ -f "${{ matrix.app }}/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No ${{ matrix.app }}/package.json yet — eslint/prettier land when the app is scaffolded. Skipping."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Lint ${{ matrix.app }}
        if: steps.detect.outputs.exists == 'true'
        working-directory: ${{ matrix.app }}
        run: |
          npm ci
          npm run lint --if-present

  # ---------------------------------------------------------------------------
  # Authoritative "done means green" gate. Re-runs the umbrella done-gate so the
  # exact same DB-free check developers run locally is what blocks the merge.
  # (Integration tests run in their own job above.)
  # ---------------------------------------------------------------------------
  done-gate:
    name: done-gate
    runs-on: ubuntu-latest
    needs: [engine, engine-integration, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: engine/uv.lock

      - name: Sync engine deps
        working-directory: engine
        run: uv sync --dev

      - name: Run done-gate
        run: python3 scripts/done_gate.py
