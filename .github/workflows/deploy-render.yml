# Deploy the full Scalers stack to Render — driven entirely from CI so no
# dashboard clicks are needed (and so the deploy can be triggered/monitored by
# the agent from an egress-restricted sandbox: GitHub is reachable, Render's
# API is not).
#
# Triggers:
#   * push touching deploy/DEPLOY_TRIGGER on this branch (works pre-merge —
#     GitHub only requires the workflow file on the default branch for
#     workflow_dispatch, not for push triggers)
#   * workflow_dispatch (available once merged to main)
#
# Required repo Actions secrets (Settings → Secrets and variables → Actions):
#   RENDER_API_KEY  — Render account API key
#   SCALERS_ENV     — full contents of the operator envfile (the runtime keys)
#
# Secrets never appear in logs (GitHub masks them; the script prints names only).

name: deploy-render

on:
  push:
    paths: ["deploy/DEPLOY_TRIGGER"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch Render should build from"
        required: false
        default: ""

concurrency:
  group: deploy-render
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Guard — secrets present
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "::error::RENDER_API_KEY repo secret is missing — add it in Settings → Secrets and variables → Actions"; exit 1; fi
          if [ -z "${{ secrets.SCALERS_ENV }}" ]; then
            echo "::error::SCALERS_ENV repo secret is missing — paste the operator envfile contents"; exit 1; fi
      - name: Provision + deploy on Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SCALERS_ENV: ${{ secrets.SCALERS_ENV }}
          DEPLOY_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
          # Free-tier defaults (the operator's account has no card). Upgrade path:
          # set repo Actions variables RENDER_PLAN_WEB/RENDER_PLAN_DB and re-run.
          RENDER_PLAN_WEB: ${{ vars.RENDER_PLAN_WEB || 'free' }}
          RENDER_PLAN_DB: ${{ vars.RENDER_PLAN_DB || 'free' }}
        run: python3 scripts/render_deploy.py
