# SYNTHETIC / DEMO tenant pack — Fenmore Tattoo (demo_studio).
# 100% FICTIONAL company-owned demo asset for eng4's tlv.6 end-to-end slice.
# NOT a real studio or people. Deliberately a different studio from ladies8391 /
# ink-studio / the real client skindesign (zero identity bleed). All channels are
# REVIEW (approve-first): the demo showcases the SAFE loop — autonomy HOLD (439) +
# human approval stay intact; execution is a MOCK/sandbox channel (eng4, tlv.6),
# never a live provider.

tenant_id = "demo_studio"
display_name = "Fenmore Tattoo"

# Fictional demo sending domain (RFC-2606 reserved .example — never resolves).
sending_domain = "outreach.fenmore.example"

[voice]
skill = "brand-voice/demo_studio"
examples_uri = "minio://voice/demo_studio/examples.jsonl"

# --- Channels (approve-first; HOLD intact — demo of the safe loop) --------------- #
[channels.instagram]
enabled = true
[channels.instagram.autonomy]
mode = "review"
threshold = 0.9
[channels.instagram.limits]
per_day = 10
per_hour = 3

[channels.facebook]
enabled = true
[channels.facebook.autonomy]
mode = "review"
threshold = 0.9
[channels.facebook.limits]
per_day = 10

[channels.gmail]
enabled = true
[channels.gmail.autonomy]
mode = "review"
threshold = 0.9
[channels.gmail.limits]
per_day = 40
per_hour = 10

[suppression]
source = "minio://suppression/demo_studio.csv"

[schedule]
timezone = "America/Denver"
posts_per_day = 1
quiet_hours = [22, 8]

[research]
sources = ["firecrawl", "meta_ad_library"]

# Secret references (resolved from the environment at access; never stored here).
# Demo tenant: these need not be set — execution is a mock/sandbox channel, no live auth.
[secrets.meta_access_token]
env = "DEMO_STUDIO_META_ACCESS_TOKEN"

[secrets.gmail_oauth_refresh]
env = "DEMO_STUDIO_GMAIL_OAUTH_REFRESH"
