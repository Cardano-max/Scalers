# Auto-load every dashboard JSON under /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: scalers
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
